# UseStakly — Quality scoring formula v2
#
# Anti-slop bump (2026-04-27) : add a `vitality` dimension fed by structural
# GitHub signals captured at ingestion (lot 1/3, migration 0018).
# v1.1 rows stay readable in artifact_scores ; v2.0 rows are added in parallel
# under the same (external_artifact_id, formula_version) uniqueness contract.
#
# Design intent :
#   - vitality = dominant anti-slop weight (0.25). A solo, fresh-pushed,
#     no-CI, no-release repo cannot reach the auto threshold on freshness alone.
#   - abandonment reduced (0.25 → 0.20) because vitality now covers the same
#     concern structurally rather than as a freshness derivative.
#   - adoption stays low (0.10) until the MCP corpus generates real signals.
#   - reliability and freshness keep the same weights minus a small trim for vitality.
#
# Anti-gaming relies on the same upstream guards as v1 (reputation, evidence,
# consensus). The formula itself is not opaque.

[meta]
version = "v2.0"
created = "2026-04-27"

# --- Dimensions ---
# Each dimension ∈ [0, 1]. overall = Σ (dim * weight), clamped to [0, 1].
# Sum of weights = 1.0.

[dimensions.freshness]
weight = 0.15
half_life_days = 180

[dimensions.adoption]
weight = 0.10
saturation = 1000

[dimensions.reliability]
weight = 0.30
min_sample = 5
neutral_default = 0.5

[dimensions.abandonment]
# v2 : abandonment is coupled with vitality. The dimension takes the max of
# the time-decay score and (1 - vitality), so a fresh-pushed but solo /
# no-CI / no-release repo is treated as de-facto abandoned. Freshness alone
# cannot mask a degraded maintainer structure.
weight = 0.20
regret_rate_threshold = 0.3

[dimensions.vitality]
# Structural vitality fed by `external_artifacts.{distinct_contributors_90d,
# commits_30d, has_ci, releases_count, last_release_at, structural_signals_at}`.
# When `structural_signals_at` is NULL (never captured) the dimension returns
# the neutral default ; otherwise each missing sub-signal is treated as 0.5
# so a partial GitHub fetch failure doesn't crater the score.
weight = 0.25
neutral_default = 0.5
contributors_saturation = 5      # collective_score = saturate(distinct_contributors_90d / 5)
commits_saturation = 10          # cadence_score    = saturate(commits_30d / 10)
release_half_life_days = 180     # release_score    = 0.5 ^ (age_days / half_life)
collective_weight = 0.30
release_weight    = 0.30
cadence_weight    = 0.20
ci_weight         = 0.20

# --- Flags ---
# Flags do NOT enter the numeric score. They are hard filters in MCP modes.

[flags]
blocking_in_auto = ["security-issue", "broken"]
blocking_in_strict = ["security-issue", "broken", "deprecated", "unmaintained"]

# --- Weighting ---
# Same upstream weighting as v1.1 (no behavioral change on signal aggregation).

[weighting]
dedup_k = 0.25

[weighting.outcome]
resolve = 1.0
re_resolve = 1.5
build_success = 1.2
build_failure = 1.2
regret = 2.0
