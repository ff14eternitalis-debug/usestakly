services:
  db:
    image: pgvector/pgvector:pg17
    container_name: usestakly-db
    environment:
      POSTGRES_DB: project_k
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_k"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
